<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FontMimic AI | 智能字體臨摹系統</title>
    <style>
        /* --- 核心排版：鎖定視窗高度，禁止捲動 --- */
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* 禁止全網頁捲動 */
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        /* 主容器：垂直排列 */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* 頂部列：精簡化 */
        header {
            background-color: var(--secondary-color);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
            flex-shrink: 0;
        }

        header h1 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 1px;
        }

        #deviceStatus {
            font-size: 12px;
            opacity: 0.8;
        }

        /* 主要內容區 */
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 10px;
            gap: 10px;
        }

        /* 卡片通用樣式 */
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--secondary-color);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 左側控制欄 (電腦版) */
        .sidebar {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }

        /* 右側核心區 */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 畫布包裝容器 */
        .canvas-area {
            flex: 1;
            position: relative;
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #mimicCanvas {
            cursor: crosshair;
            touch-action: none;
        }

        /* 影像預覽區域 */
        .img-container {
            width: 100%;
            height: 80px;
            background: #eee;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin: 5px 0;
        }

        .img-container img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
        }

        /* 表單元素樣式 */
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 8px;
            font-size: 13px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            padding: 8px 15px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: var(--primary-color);
            color: white;
            transition: all 0.2s;
            font-weight: 500;
        }

        button:hover:not(:disabled) {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        button.secondary {
            background-color: #95a5a6;
        }

        button.accent {
            background-color: var(--accent-color);
        }

        /* 評分反饋區 */
        .feedback-bar {
            height: 60px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            background: var(--secondary-color);
            color: white;
            border-radius: 8px;
        }

        .score-box { font-size: 20px; font-weight: bold; color: #f1c40f; }
        .feedback-text { font-size: 13px; flex: 1; margin: 0 15px; color: #ecf0f1; }

        /* --- 手機版響應式修正 --- */
        @media (max-width: 768px) {
            main {
                flex-direction: column;
                padding: 5px;
                gap: 5px;
            }

            .sidebar {
                width: 100%;
                flex-direction: row; /* 手機版步驟 1&2 並排 */
                height: 160px;
            }

            .sidebar .card {
                flex: 1;
                padding: 8px;
            }

            .img-container { height: 40px; } /* 手機版縮小預覽 */
            
            .card-title { font-size: 12px; margin-bottom: 4px; }
            
            .feedback-bar {
                height: auto;
                min-height: 50px;
                flex-direction: column;
                padding: 8px;
                text-align: center;
            }
            .feedback-text { margin: 5px 0; font-size: 11px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>FontMimic AI</h1>
            <div id="deviceStatus">初始化中...</div>
        </header>

        <main>
            <div class="sidebar">
                <div class="card">
                    <div class="card-title">① 上傳分析</div>
                    <input type="file" id="imageInput" accept="image/*">
                    <div class="img-container">
                        <img id="previewImage" src="" style="display:none">
                        <span id="uploadHint" style="font-size:11px; color:#999">尚未上傳</span>
                    </div>
                    <button id="btnAnalyze" disabled>開始解析</button>
                </div>

                <div class="card">
                    <div class="card-title">② 生成參考</div>
                    <input type="text" id="practiceTextInput" placeholder="輸入練習字">
                    <div class="img-container">
                        <img id="referenceImage" src="" style="display:none">
                        <span id="generateHint" style="font-size:11px; color:#999">等待解析</span>
                    </div>
                    <button id="btnGenerate" disabled>生成圖片</button>
                </div>
            </div>

            <div class="workspace">
                <div class="card-title" style="margin-left:5px;">③ 手寫練習區</div>
                <div class="canvas-area">
                    <canvas id="mimicCanvas"></canvas>
                </div>
                
                <div style="display:flex; gap:10px;">
                    <button id="btnClear" class="secondary" style="flex:1">清除畫布</button>
                    <button id="btnScore" class="accent" style="flex:2">送出評分</button>
                </div>

                <div class="feedback-bar">
                    <div class="score-box" id="scoreText">-- 分</div>
                    <div class="feedback-text" id="feedbackText">完成臨摹後點擊送出評分...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- 核心變數 ---
        let currentUploadedBase64 = ""; 
        let currentAiTags = null;       
        const API_BASE_URL = "http://127.0.0.1:8000"; 

        const canvas = document.getElementById('mimicCanvas');
        const ctx = canvas.getContext('2d');
        const deviceStatus = document.getElementById('deviceStatus');

        // --- 1. 畫布響應式初始化 ---
        function initCanvas() {
            const container = document.querySelector('.canvas-area');
            // 精確抓取容器寬高，達成「不捲動」的完美貼合
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;

            const isMobile = window.innerWidth <= 768;
            deviceStatus.innerText = isMobile ? "📱 行動模式" : "💻 電腦模式";

            // 初始化畫筆
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#333";
            ctx.lineWidth = isMobile ? 3 : 5;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
        }

        // 監聽視窗變化，但在手機版避免因為鍵盤彈出導致重繪
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) initCanvas();
        });
        window.onload = initCanvas;

        // --- 2. 繪圖邏輯 (整合滑鼠與觸控) ---
        let isDrawing = false;

        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function startDrawing(e) {
            if (e.target === canvas) {
                e.preventDefault();
                isDrawing = true;
                const pos = getCoordinates(e);
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
            }
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getCoordinates(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function stopDrawing() {
            isDrawing = false;
            ctx.closePath();
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);

        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        window.addEventListener('touchend', stopDrawing);

        // --- 3. UI 互動與 API 邏輯 ---

        // 清除
        document.getElementById('btnClear').addEventListener('click', () => {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            document.getElementById('scoreText').innerText = "-- 分";
            document.getElementById('feedbackText').innerText = "畫布已清空";
        });

        // 步驟 1: 上傳
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                currentUploadedBase64 = event.target.result;
                const preview = document.getElementById('previewImage');
                preview.src = currentUploadedBase64;
                preview.style.display = "block";
                document.getElementById('uploadHint').style.display = "none";
                document.getElementById('btnAnalyze').disabled = false;
            };
            reader.readAsDataURL(file);
        });

        // 步驟 1: 解析
        document.getElementById('btnAnalyze').addEventListener('click', async () => {
            const btn = document.getElementById('btnAnalyze');
            const hint = document.getElementById('feedbackText');
            btn.disabled = true;
            hint.innerText = "AI 正在分析字體風格...";

            try {
                const response = await fetch(`${API_BASE_URL}/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image_base64: currentUploadedBase64 })
                });
                const data = await response.json();
                currentAiTags = data.ai_tags;
                hint.innerText = `分析成功！匹配字體：${data.matched_font.font_name}`;
                document.getElementById('btnGenerate').disabled = false;
                document.getElementById('generateHint').innerText = "請輸入文字後點擊生成";
            } catch (err) {
                hint.innerText = "連線失敗，請檢查後端狀態";
                btn.disabled = false;
            }
        });

        // 步驟 2: 生成
        document.getElementById('btnGenerate').addEventListener('click', async () => {
            const text = document.getElementById('practiceTextInput').value;
            if (!text) return alert("請輸入文字");
            
            const btn = document.getElementById('btnGenerate');
            btn.disabled = true;
            btn.innerText = "...";

            try {
                const response = await fetch(`${API_BASE_URL}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, tags: currentAiTags })
                });
                const data = await response.json();
                const refImg = document.getElementById('referenceImage');
                refImg.src = data.generated_image_base64;
                refImg.style.display = "block";
                document.getElementById('generateHint').style.display = "none";
            } catch (err) {
                // 測試用 mock
                document.getElementById('referenceImage').src = `https://via.placeholder.com/300x100.png?text=${encodeURIComponent(text)}`;
                document.getElementById('referenceImage').style.display = "block";
                document.getElementById('generateHint').style.display = "none";
            } finally {
                btn.disabled = false;
                btn.innerText = "生成圖片";
            }
        });

        // 步驟 4: 評分
        document.getElementById('btnScore').addEventListener('click', async () => {
            const scoreBtn = document.getElementById('btnScore');
            const userImg = canvas.toDataURL('image/png');
            scoreBtn.disabled = true;
            document.getElementById('scoreText').innerText = "計算";
            document.getElementById('feedbackText').innerText = "正在傳送資料至 AI 評分引擎...";

            try {
                const response = await fetch(`${API_BASE_URL}/score`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        user_image: userImg,
                        reference_text: document.getElementById('practiceTextInput').value 
                    })
                });
                const data = await response.json();
                document.getElementById('scoreText').innerText = `${data.score} 分`;
                document.getElementById('feedbackText').innerText = data.feedback;
            } catch (err) {
                document.getElementById('scoreText').innerText = "?? 分";
                document.getElementById('feedbackText').innerText = "評分暫時無法連線";
            } finally {
                scoreBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
